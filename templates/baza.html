<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Лучший сайт{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Йоу</a>

        <div>
            {% if current_user.is_authenticated %}
                <a class="btn btn-outline-light me-2" href="/profile">Аккаунт</a>
                <a class="btn btn-danger" href="/logout">Уйти</a>
            {% else %}
                <a class="btn btn-outline-light me-2" href="/login">Вхождейшен</a>
                <a class="btn btn-success" href="/register">Регистрейшен</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
